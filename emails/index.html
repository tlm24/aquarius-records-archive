<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Emails — Aquarius Records Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; font-size: 14px; }
    a { color: inherit; text-decoration: none; }
    header { background: #111; color: #fff; padding: 24px 0; }
    header .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { color: #888; font-size: 13px; margin-top: 4px; }
    header a { color: #888; font-size: 13px; }
    header a:hover { color: #fff; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; gap: 12px; flex-wrap: wrap; }
    .top-bar h2 { font-size: 18px; font-weight: 600; }
    .top-bar input { flex: 1; min-width: 200px; padding: 9px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .top-bar input:focus { border-color: #1a1a1a; }
    .email-list { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
    .email-row { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; gap: 14px; }
    .email-row:last-child { border-bottom: none; }
    .email-row:hover { background: #fafafa; }
    .email-num { font-size: 12px; font-weight: 600; color: #888; min-width: 50px; }
    .email-subject { flex: 1; font-size: 14px; }
    .email-subject a { color: #1a1a1a; }
    .email-subject a:hover { text-decoration: underline; }
    .email-date { font-size: 12px; color: #888; min-width: 80px; text-align: right; }
    .empty-state { text-align: center; padding: 48px; color: #888; }
    footer { text-align: center; padding: 24px; color: #888; font-size: 12px; border-top: 1px solid #e5e5e5; margin-top: 32px; }
    footer a { color: #888; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Aquarius Records Archive</h1>
      <p>All 200 New Arrivals newsletters</p>
      <div style="margin-top:12px;"><a href="index.html">← Back to Archive</a></div>
    </div>
  </header>
  <div class="container">
    <div class="top-bar">
      <h2>All Emails</h2>
      <input type="text" id="search" placeholder="Filter by subject, list #..." oninput="filterList()">
    </div>
    <div class="email-list" id="list"></div>
    <div class="empty-state" id="empty" style="display:none">No emails found</div>
  </div>
  <footer><a href="index.html">Aquarius Records Archive</a></footer>
  <script>
    let emails = [];
    fetch('emails.json').then(r => r.json()).then(d => {
      emails = d.sort((a, b) => new Date(b._date) - new Date(a._date));
      renderList(emails);
    });
    function renderList(list) {
      const el = document.getElementById('list');
      const empty = document.getElementById('empty');
      if (!list.length) { el.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      el.innerHTML = list.map(e => {
        const d = new Date(e._date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return '<div class="email-row">' +
          '<span class="email-num">#' + (e._list_num || '') + '</span>' +
          '<span class="email-subject"><a href="' + e.id + '.html">' + escHtml(e.subject || '') + '</a></span>' +
          '<span class="email-date">' + dateStr + '</span></div>';
      }).join('');
    }
    function filterList() {
      const q = document.getElementById('search').value.toLowerCase();
      const filtered = emails.filter(e => {
        if (!q) return true;
        return ((e.subject || '') + ' ' + (e._list_num || '')).toLowerCase().includes(q);
      });
      renderList(filtered);
    }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
